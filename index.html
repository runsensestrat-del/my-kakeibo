<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NextWealth</title>
    
    <!-- 必要なライブラリの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (互換モード) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { 
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            overflow: hidden;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Firebase 設定領域 ---
        // ここに自分のFirebaseコンソールの設定を貼り付けてください
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // Firebase初期化の安全チェック
        let db, auth;
        const isFirebaseConfigured = firebaseConfig.apiKey !== "";

        if (isFirebaseConfigured) {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
            } catch (err) {
                console.error("Firebase Init Error:", err);
            }
        }

        const { useState, useEffect, useMemo } = React;

        // --- 定数定義 ---
        const CATEGORIES = [
            { id: 'food', label: '食費', icon: '🍱', color: 'bg-orange-500' },
            { id: 'transport', label: '交通費', icon: '🚃', color: 'bg-blue-500' },
            { id: 'daily', label: '日用品', icon: '🛒', color: 'bg-green-500' },
            { id: 'ent', label: '娯楽', icon: '🎮', color: 'bg-purple-500' },
            { id: 'house', label: '固定費', icon: '🏠', color: 'bg-indigo-500' },
            { id: 'invest', label: '投資', icon: '📈', color: 'bg-amber-600' },
        ];

        // --- LucideアイコンのReactラッパー ---
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [transactions, setTransactions] = useState([]);
            const [activeTab, setActiveTab] = useState('calendar');
            const [isInputOpen, setIsInputOpen] = useState(false);
            const [inputAmount, setInputAmount] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0]);
            const [loading, setLoading] = useState(isFirebaseConfigured);

            // 1. 認証処理
            useEffect(() => {
                if (!isFirebaseConfigured) return;
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            console.error("Auth error", e);
                        }
                    } else {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. データ取得 (Firestore)
            useEffect(() => {
                if (!user || !isFirebaseConfigured) return;
                const unsubscribe = db.collection('transactions')
                    .where('userId', '==', user.uid)
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTransactions(data);
                    }, err => console.error("Firestore Error:", err));
                return () => unsubscribe();
            }, [user]);

            // アイコン再描画
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isInputOpen, transactions]);

            // サマリー計算
            const summary = useMemo(() => {
                return transactions.reduce((acc, t) => {
                    const amt = Number(t.amount) || 0;
                    if (t.type === 'income') acc.income += amt;
                    else acc.expense += amt;
                    return acc;
                }, { income: 0, expense: 0 });
            }, [transactions]);

            // カレンダー生成
            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayTotal = transactions
                        .filter(t => t.date === dateStr && t.type !== 'income')
                        .reduce((sum, t) => sum + (Number(t.amount) || 0), 0);
                    days.push({ day: d, date: dateStr, total: dayTotal });
                }
                return days;
            }, [currentDate, transactions]);

            const handleSave = async () => {
                if (!inputAmount) return;
                const newTx = {
                    date: currentDate.toISOString().split('T')[0],
                    amount: parseInt(inputAmount),
                    category: selectedCategory.id,
                    note: selectedCategory.label,
                    type: 'expense',
                    userId: user?.uid || 'guest',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (isFirebaseConfigured && user) {
                    await db.collection('transactions').add(newTx);
                } else {
                    setTransactions([...transactions, { id: Date.now().toString(), ...newTx }]);
                }
                
                setInputAmount('');
                setIsInputOpen(false);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white text-orange-500 font-bold italic">
                    LOADING NEXTWEALTH...
                </div>
            );

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-50 relative overflow-hidden shadow-2xl">
                    
                    {/* Header */}
                    <div className="bg-orange-500 safe-top pt-10 pb-6 px-6 text-white rounded-b-[2.5rem] shadow-lg">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-2">
                                <div className="p-2 bg-white/20 rounded-xl backdrop-blur-md">
                                    <Icon name="trending-up" size={20} />
                                </div>
                                <h1 className="text-xl font-black italic tracking-tighter uppercase">NextWealth</h1>
                            </div>
                            <div className="flex gap-4 opacity-80">
                                <Icon name="shield-check" size={22} />
                                <Icon name="bell" size={22} />
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-2 text-center">
                            <div className="bg-white/10 p-2 rounded-2xl">
                                <p className="text-[9px] font-bold uppercase opacity-60 tracking-widest">Income</p>
                                <p className="text-xs font-black">¥{summary.income.toLocaleString()}</p>
                            </div>
                            <div className="bg-white/20 p-2 rounded-2xl border border-white/20 scale-110 shadow-xl">
                                <p className="text-[9px] font-bold uppercase opacity-80 tracking-widest">Expense</p>
                                <p className="text-sm font-black italic">¥{summary.expense.toLocaleString()}</p>
                            </div>
                            <div className="bg-white/10 p-2 rounded-2xl">
                                <p className="text-[9px] font-bold uppercase opacity-60 tracking-widest">Balance</p>
                                <p className="text-xs font-black">¥{(summary.income - summary.expense).toLocaleString()}</p>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto px-4 pt-6 pb-32">
                        {activeTab === 'calendar' && (
                            <div className="animate-in space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-lg font-black text-slate-800">{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</h2>
                                    <div className="flex gap-1 bg-white p-1 rounded-xl border border-slate-100 shadow-sm">
                                        <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth() - 1)))} className="p-1 hover:bg-slate-50"><Icon name="chevron-left" size={18}/></button>
                                        <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth() + 1)))} className="p-1 hover:bg-slate-50"><Icon name="chevron-right" size={18}/></button>
                                    </div>
                                </div>

                                <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <div className="grid grid-cols-7 mb-4 text-[10px] font-black text-slate-300 text-center uppercase tracking-widest">
                                        {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => <div key={d}>{d}</div>)}
                                    </div>
                                    <div className="grid grid-cols-7 gap-y-1">
                                        {calendarDays.map((d, i) => (
                                            <div key={i} className="h-14 flex flex-col items-center justify-center rounded-xl hover:bg-slate-50 transition-all cursor-pointer">
                                                <span className={`text-xs font-bold mb-1 ${d?.day === new Date().getDate() && currentDate.getMonth() === new Date().getMonth() ? 'w-6 h-6 flex items-center justify-center bg-orange-500 text-white rounded-lg' : 'text-slate-600'}`}>
                                                    {d?.day}
                                                </span>
                                                {d?.total > 0 && <span className="text-[8px] font-black text-orange-500">¥{(d.total / 1000).toFixed(1)}k</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest px-2">Recent Records</h3>
                                    {transactions.length === 0 ? (
                                        <div className="text-center py-10 text-slate-300 text-xs italic font-bold">No records yet.</div>
                                    ) : (
                                        transactions.slice(-3).reverse().map(t => {
                                            const cat = CATEGORIES.find(c => c.id === t.category) || CATEGORIES[0];
                                            return (
                                                <div key={t.id} className="bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm animate-in">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-12 h-12 ${cat.color} rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-${cat.color.split('-')[1]}-100`}>{cat.icon}</div>
                                                        <div>
                                                            <p className="text-sm font-black text-slate-800">{t.note}</p>
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase">{t.date}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`font-black italic ${t.type === 'income' ? 'text-green-500' : 'text-slate-800'}`}>
                                                        {t.type === 'income' ? '+' : '-'}¥{Number(t.amount).toLocaleString()}
                                                    </p>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'assets' && (
                            <div className="animate-in space-y-4">
                                <h2 className="text-xl font-black text-slate-800 px-2 italic uppercase tracking-tighter">Assets Hub</h2>
                                <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-orange-500/20 blur-3xl rounded-full -mr-10 -mt-10"></div>
                                    <p className="text-[10px] font-bold opacity-50 uppercase tracking-widest mb-1">Total Balance</p>
                                    <p className="text-3xl font-black italic tracking-tighter">¥4,820,000</p>
                                    <div className="mt-6 flex gap-2">
                                        <span className="px-3 py-1 bg-white/10 rounded-full text-[9px] font-bold">+2.4% this month</span>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <div className="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center font-black">SBI</div>
                                            <div><p className="text-sm font-black">住信SBIネット銀行</p><p className="text-[10px] text-slate-400 font-bold uppercase">Main Account</p></div>
                                        </div>
                                        <p className="font-black text-slate-700">¥1,240,000</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center font-black">RAK</div>
                                            <div><p className="text-sm font-black">楽天証券</p><p className="text-[10px] text-slate-400 font-bold uppercase">NISA / Investing</p></div>
                                        </div>
                                        <p className="font-black text-slate-700">¥3,580,000</p>
                                    </div>
                                </div>
                                <button className="w-full py-5 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400 text-xs font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-slate-50 transition-colors">
                                    <Icon name="plus" size={16} /> Link New Account
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-2xl border-t safe-bottom px-8 pt-4 pb-8 flex justify-between items-center z-40">
                        <button onClick={() => setActiveTab('calendar')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'calendar' ? 'text-orange-500 scale-110' : 'text-slate-300'}`}>
                            <Icon name="calendar" size={24} />
                            <span className="text-[8px] font-black uppercase tracking-tighter">Home</span>
                        </button>
                        <button onClick={() => setActiveTab('assets')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'assets' ? 'text-orange-500 scale-110' : 'text-slate-300'}`}>
                            <Icon name="wallet" size={24} />
                            <span className="text-[8px] font-black uppercase tracking-tighter">Assets</span>
                        </button>
                        <div className="relative -top-6">
                            <button onClick={() => setIsInputOpen(true)} className="w-16 h-16 bg-orange-500 rounded-2xl shadow-2xl shadow-orange-200 text-white flex items-center justify-center transform active:scale-90 transition-all">
                                <Icon name="plus" size={32} />
                            </button>
                        </div>
                        <button onClick={() => setActiveTab('invest')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'invest' ? 'text-orange-500 scale-110' : 'text-slate-300'}`}>
                            <Icon name="pie-chart" size={24} />
                            <span className="text-[8px] font-black uppercase tracking-tighter">Analysis</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'settings' ? 'text-orange-500 scale-110' : 'text-slate-300'}`}>
                            <Icon name="settings" size={24} />
                            <span className="text-[8px] font-black uppercase tracking-tighter">Settings</span>
                        </button>
                    </nav>

                    {/* Input Modal */}
                    {isInputOpen && (
                        <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-end">
                            <div className="w-full bg-white rounded-t-[3.5rem] p-8 pb-12 space-y-6 animate-in shadow-2xl">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-black italic uppercase tracking-tighter">Quick Entry</h2>
                                    <button onClick={() => setIsInputOpen(false)} className="bg-slate-100 p-2 rounded-full text-slate-400">✕</button>
                                </div>
                                
                                <div className="relative group">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-3xl font-black italic text-slate-300">¥</span>
                                    <input 
                                        autoFocus
                                        type="number" 
                                        value={inputAmount}
                                        onChange={(e) => setInputAmount(e.target.value)}
                                        placeholder="0"
                                        className="w-full text-6xl font-black text-center bg-slate-50 py-10 rounded-[2.5rem] border-none outline-none focus:ring-4 focus:ring-orange-500/10 text-slate-800 tracking-tighter shadow-inner"
                                    />
                                </div>

                                <div className="grid grid-cols-3 gap-3">
                                    {CATEGORIES.map(cat => (
                                        <button 
                                            key={cat.id}
                                            onClick={() => setSelectedCategory(cat)}
                                            className={`p-4 rounded-3xl flex flex-col items-center gap-1 transition-all ${selectedCategory.id === cat.id ? 'bg-orange-500 text-white shadow-xl scale-105' : 'bg-slate-50 text-slate-400'}`}
                                        >
                                            <span className="text-2xl">{cat.icon}</span>
                                            <span className="text-[10px] font-black uppercase tracking-widest">{cat.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-3 pt-4">
                                    <button className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
                                        <Icon name="camera" size={18} /> Receipt
                                    </button>
                                    <button 
                                        onClick={handleSave}
                                        className="flex-[2] py-5 bg-orange-500 text-white rounded-3xl font-black text-lg shadow-xl shadow-orange-100 active:scale-95 transition-all uppercase tracking-tighter"
                                    >
                                        Save Data
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
