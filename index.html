<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NextWealth - 家計管理</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        html, body { 
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        #root { height: 100%; width: 100%; }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        .scroll-container { -webkit-overflow-scrolling: touch; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* カスタムスクロールバー非表示 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const apiKey = ""; // Runtimeで提供されるため空のまま
        const { useState, useEffect, useMemo, useRef } = React;

        const CATEGORIES = [
            { id: 'food', label: '食費', icon: '🍱', color: 'bg-orange-500' },
            { id: 'transport', label: '交通費', icon: '🚃', color: 'bg-blue-500' },
            { id: 'daily', label: '日用品', icon: '🛒', color: 'bg-green-500' },
            { id: 'ent', label: '娯楽', icon: '🎮', color: 'bg-purple-500' },
            { id: 'house', label: '固定費', icon: '🏠', color: 'bg-indigo-500' },
            { id: 'invest', label: '投資', icon: '📈', color: 'bg-amber-600' },
        ];

        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // Gemini AI解析関数
        async function analyzeReceipt(base64Image) {
            const prompt = `このレシート画像から「合計金額(amount)」と「最も適切なカテゴリ(category)」を抽出してください。
            カテゴリは以下のいずれかから選んでください: food, transport, daily, ent, house, invest。
            返信は必ず以下のJSON形式のみで行ってください。余計な説明は不要です。
            {"amount": 1234, "category": "food"}`;

            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64Image.split(',')[1] } }
                    ]
                }]
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    return JSON.parse(text.replace(/```json|```/g, '').trim());
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("解析に失敗しました");
        }

        function App() {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [transactions, setTransactions] = useState([
                { id: '1', date: '2024-03-10', amount: 1200, category: 'food', note: 'ランチ', type: 'expense' },
                { id: '2', date: '2024-03-11', amount: 500, category: 'transport', note: 'バス代', type: 'expense' }
            ]);
            const [activeTab, setActiveTab] = useState('home');
            const [isInputOpen, setIsInputOpen] = useState(false);
            const [inputAmount, setInputAmount] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0]);
            const [isScanning, setIsScanning] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isInputOpen, isScanning]);

            const summary = useMemo(() => {
                return transactions.reduce((acc, t) => {
                    const amt = Number(t.amount) || 0;
                    if (t.type === 'income') acc.income += amt;
                    else acc.expense += amt;
                    return acc;
                }, { income: 0, expense: 584000 }); // サンプル初期値
            }, [transactions]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsScanning(true);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const result = await analyzeReceipt(event.target.result);
                        setInputAmount(result.amount.toString());
                        const cat = CATEGORIES.find(c => c.id === result.category) || CATEGORIES[0];
                        setSelectedCategory(cat);
                        setIsScanning(false);
                    } catch (error) {
                        alert("解析できませんでした。手動で入力してください。");
                        setIsScanning(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            const handleSave = () => {
                if (!inputAmount) return;
                const newTx = {
                    id: Date.now().toString(),
                    date: new Date().toISOString().split('T')[0],
                    amount: parseInt(inputAmount),
                    category: selectedCategory.id,
                    note: selectedCategory.label,
                    type: 'expense'
                };
                setTransactions([newTx, ...transactions]);
                setInputAmount('');
                setIsInputOpen(false);
            };

            return (
                <div className="flex flex-col h-full w-full bg-slate-50 relative overflow-hidden">
                    
                    {/* ヘッダー */}
                    <header className="bg-orange-500 safe-top pt-10 pb-8 px-6 text-white rounded-b-[3rem] shadow-xl shrink-0 z-10">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-2">
                                <div className="p-2 bg-white/20 rounded-xl backdrop-blur-md"><Icon name="trending-up" size={20} /></div>
                                <h1 className="text-2xl font-black italic tracking-tighter">NEXTWEALTH</h1>
                            </div>
                            <div className="flex gap-4">
                                <div className="p-2 bg-white/10 rounded-full"><Icon name="bell" size={20} /></div>
                                <div className="p-2 bg-white/10 rounded-full"><Icon name="user" size={20} /></div>
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-md p-6 rounded-[2.5rem] border border-white/20 flex justify-between items-center">
                            <div>
                                <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">今月の支出</p>
                                <p className="text-3xl font-black italic tracking-tighter">¥{summary.expense.toLocaleString()}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">残高</p>
                                <p className="text-lg font-bold">¥1,240,000</p>
                            </div>
                        </div>
                    </header>

                    {/* コンテンツエリア */}
                    <main className="flex-1 overflow-y-auto scroll-container px-6 pt-6 pb-32">
                        {activeTab === 'home' && (
                            <div className="animate-in space-y-8 max-w-2xl mx-auto">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-xl font-black text-slate-800 italic uppercase">最近の履歴</h2>
                                    <button className="text-xs font-bold text-orange-500">すべて見る</button>
                                </div>

                                <div className="space-y-4">
                                    {transactions.map(t => {
                                        const cat = CATEGORIES.find(c => c.id === t.category) || CATEGORIES[0];
                                        return (
                                            <div key={t.id} className="bg-white p-5 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm active:scale-95 transition-transform">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-14 h-14 ${cat.color} rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-${cat.color.split('-')[1]}-100`}>
                                                        {cat.icon}
                                                    </div>
                                                    <div>
                                                        <p className="text-base font-black text-slate-800 tracking-tight">{t.note}</p>
                                                        <p className="text-[11px] text-slate-400 font-bold uppercase">{t.date}</p>
                                                    </div>
                                                </div>
                                                <p className="font-black italic text-lg tracking-tighter text-slate-800">
                                                    -¥{Number(t.amount).toLocaleString()}
                                                </p>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* レポートプレースホルダー */}
                                <div className="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 blur-2xl rounded-full -mr-10 -mt-10"></div>
                                    <h3 className="text-lg font-black mb-2">支出を分析しましょう</h3>
                                    <p className="text-sm opacity-80 leading-relaxed mb-6">先月より食費が12%減少しています。この調子で貯金を続けましょう！</p>
                                    <button className="bg-white text-indigo-600 px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest">詳細を見る</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ナビゲーション */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-3xl border-t border-slate-100 safe-bottom px-8 pt-4 pb-10 flex justify-between items-center z-40">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 ${activeTab === 'home' ? 'text-orange-500' : 'text-slate-300'}`}>
                            <Icon name="home" size={26} />
                            <span className="text-[10px] font-black uppercase">ホーム</span>
                        </button>
                        <button onClick={() => setActiveTab('assets')} className={`flex flex-col items-center gap-1 ${activeTab === 'assets' ? 'text-orange-500' : 'text-slate-300'}`}>
                            <Icon name="credit-card" size={26} />
                            <span className="text-[10px] font-black uppercase">資産</span>
                        </button>
                        
                        <div className="relative -top-8">
                            <button onClick={() => setIsInputOpen(true)} className="w-20 h-20 bg-orange-500 rounded-[2rem] shadow-2xl shadow-orange-200 text-white flex items-center justify-center transform active:scale-90 transition-all">
                                <Icon name="plus" size={36} />
                            </button>
                        </div>

                        <button onClick={() => setActiveTab('report')} className={`flex flex-col items-center gap-1 ${activeTab === 'report' ? 'text-orange-500' : 'text-slate-300'}`}>
                            <Icon name="bar-chart-2" size={26} />
                            <span className="text-[10px] font-black uppercase">分析</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-orange-500' : 'text-slate-300'}`}>
                            <Icon name="settings" size={26} />
                            <span className="text-[10px] font-black uppercase">設定</span>
                        </button>
                    </nav>

                    {/* 入力モーダル */}
                    {isInputOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end">
                            <div className="w-full bg-white rounded-t-[3.5rem] p-8 pb-12 space-y-8 animate-in shadow-2xl max-w-2xl mx-auto">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black italic tracking-tighter">収支を記録</h2>
                                    <button onClick={() => setIsInputOpen(false)} className="bg-slate-100 p-3 rounded-full text-slate-400 active:bg-slate-200">✕</button>
                                </div>

                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="flex-1 bg-indigo-50 border-2 border-indigo-100 py-6 rounded-3xl flex flex-col items-center gap-2 text-indigo-600 active:bg-indigo-100 transition-colors relative"
                                        disabled={isScanning}
                                    >
                                        {isScanning ? (
                                            <div className="animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent"></div>
                                        ) : (
                                            <>
                                                <Icon name="camera" size={28} />
                                                <span className="text-xs font-black">レシートを撮る</span>
                                            </>
                                        )}
                                        <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*" className="hidden" />
                                    </button>
                                    <div className="flex-1 bg-slate-50 py-6 rounded-3xl flex flex-col items-center gap-2 text-slate-400 border-2 border-slate-100 opacity-50 cursor-not-allowed">
                                        <Icon name="mic" size={28} />
                                        <span className="text-xs font-black">声で入力</span>
                                    </div>
                                </div>

                                <div className="relative">
                                    <span className="absolute left-8 top-1/2 -translate-y-1/2 text-4xl font-black italic text-slate-300">¥</span>
                                    <input 
                                        autoFocus
                                        type="number" 
                                        value={inputAmount}
                                        onChange={(e) => setInputAmount(e.target.value)}
                                        placeholder="0"
                                        className="w-full text-7xl font-black text-center bg-slate-50 py-12 rounded-[2.5rem] border-none outline-none focus:ring-4 focus:ring-orange-500/10 text-slate-800 tracking-tighter"
                                    />
                                </div>

                                <div className="grid grid-cols-3 gap-3">
                                    {CATEGORIES.map(cat => (
                                        <button 
                                            key={cat.id}
                                            onClick={() => setSelectedCategory(cat)}
                                            className={`p-5 rounded-[2rem] flex flex-col items-center gap-2 transition-all ${selectedCategory.id === cat.id ? 'bg-orange-500 text-white shadow-xl scale-105' : 'bg-slate-50 text-slate-400 border border-slate-100'}`}
                                        >
                                            <span className="text-3xl">{cat.icon}</span>
                                            <span className="text-[10px] font-black tracking-widest">{cat.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <button 
                                    onClick={handleSave}
                                    className="w-full py-6 bg-orange-500 text-white rounded-[2rem] font-black text-xl shadow-xl shadow-orange-100 active:scale-95 transition-all uppercase"
                                >
                                    保存する
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
