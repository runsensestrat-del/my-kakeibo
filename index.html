<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NextWealth</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f8fafc; }
        .app-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return (
                <div className="app-container p-10">
                    <div className="bg-orange-500 w-20 h-20 rounded-3xl flex items-center justify-center shadow-lg mb-6 mx-auto">
                        <i data-lucide="wallet" className="text-white w-10 h-10"></i>
                    </div>
                    <h1 className="text-2xl font-black text-slate-800 mb-2">NEXTWEALTH</h1>
                    <p className="text-slate-500 text-sm mb-8">Webアプリが正常に起動しました！</p>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-left w-full max-w-xs">
                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">設定方法</p>
                        <p className="text-sm text-slate-600 leading-relaxed">
                            iPhone: Safariの共有ボタンから「ホーム画面に追加」<br/>
                            Android: Chromeのメニューから「アプリをインストール」
                        </p>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
