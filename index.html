<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsidOri Clone - 共有家計簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #f97316; }
        .mode-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 flex justify-center items-start min-h-screen">

    <div id="app" class="w-full max-w-md bg-white min-h-screen shadow-2xl relative flex flex-col overflow-hidden">
        
        <!-- Header & Mode Switcher -->
        <header class="pt-12 px-6 pb-4 bg-white border-b border-slate-100 sticky top-0 z-30">
            <div class="flex bg-slate-100 p-1 rounded-2xl relative w-full h-10">
                <div id="mode-bg" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white rounded-xl shadow-sm transition-transform duration-300"></div>
                <button onclick="setMode('private')" class="flex-1 relative z-10 text-xs font-bold flex items-center justify-center gap-2 transition-colors" id="btn-private">
                    <i class="fa-solid fa-user"></i> 自分
                </button>
                <button onclick="setMode('couple')" class="flex-1 relative z-10 text-xs font-bold flex items-center justify-center gap-2 transition-colors" id="btn-couple">
                    <i class="fa-solid fa-users"></i> ふたり
                </button>
            </div>
        </header>

        <!-- Balance Card -->
        <section id="balance-card" class="p-6 text-white mode-transition bg-orange-500">
            <div class="flex justify-between items-center mb-6">
                <h1 id="mode-title" class="text-xl font-black tracking-tight">ふたりの家計簿</h1>
                <div class="flex gap-4">
                    <i class="fa-solid fa-bell opacity-80"></i>
                    <i class="fa-solid fa-gear opacity-80"></i>
                </div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-3xl p-6 border border-white/20">
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest mb-1">今月の支出合計</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-3xl font-black italic">¥<span id="total-amount">0</span></span>
                    <span class="text-xs opacity-60">/ 目標 ¥150,000</span>
                </div>
            </div>
        </section>

        <!-- Transaction List -->
        <main class="flex-1 overflow-y-auto px-6 pt-6 pb-32 scroll-hide">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-wider">最新の履歴</h2>
                <span class="text-[10px] font-bold text-orange-500">すべて見る</span>
            </div>
            <div id="transaction-list" class="space-y-3">
                <!-- Data injected here -->
                <div class="py-20 text-center text-slate-300 flex flex-col items-center gap-2">
                    <i class="fa-solid fa-circle-notch animate-spin text-2xl"></i>
                    <p class="text-sm font-bold">読み込み中...</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-xl border-t border-slate-100 px-8 pt-3 pb-8 flex justify-between items-end z-40 safe-area-bottom">
            <button class="flex flex-col items-center gap-1 active-tab">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">ホーム</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-300">
                <i class="fa-solid fa-chart-pie text-xl"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">分析</span>
            </button>
            
            <div class="relative -top-6">
                <button onclick="openModal()" id="add-btn" class="w-16 h-16 rounded-[2rem] shadow-2xl flex items-center justify-center text-white active:scale-90 transition-all duration-300 bg-orange-500 shadow-orange-200">
                    <i class="fa-solid fa-plus text-3xl"></i>
                </button>
            </div>

            <button class="flex flex-col items-center gap-1 text-slate-300">
                <i class="fa-solid fa-user-group text-xl"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">共有</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-300">
                <i class="fa-solid fa-bullseye text-xl"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">目標</span>
            </button>
        </nav>

        <!-- Entry Modal -->
        <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-end opacity-0 pointer-events-none transition-opacity duration-300">
            <div class="w-full bg-white rounded-t-[3rem] p-8 space-y-6 shadow-2xl max-w-md mx-auto transform translate-y-full transition-transform duration-300" id="modal-content">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-black italic tracking-tight" id="modal-title">支出を追加</h2>
                    <button onclick="closeModal()" class="bg-slate-100 w-8 h-8 rounded-full text-slate-400">✕</button>
                </div>

                <div class="flex gap-4">
                    <button onclick="triggerFileSelect()" class="flex-1 bg-orange-50 border-2 border-orange-100 py-4 rounded-2xl flex flex-col items-center gap-1 text-orange-600 active:bg-orange-100" id="scan-btn">
                        <i class="fa-solid fa-camera text-xl" id="scan-icon"></i>
                        <span class="text-[10px] font-black">AIレシート解析</span>
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImageAnalysis(event)">
                    <div class="flex-1 bg-slate-50 border-2 border-slate-100 py-4 rounded-2xl flex flex-col items-center gap-1 text-slate-300">
                        <i class="fa-solid fa-pen-to-square text-xl"></i>
                        <span class="text-[10px] font-black">手動入力</span>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-3xl p-6 border-2 border-slate-100">
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-black text-slate-300">¥</span>
                        <input type="number" id="input-amount" placeholder="0" class="w-full text-5xl font-black border-none bg-transparent focus:ring-0 p-0 placeholder:text-slate-200">
                    </div>
                </div>

                <div id="category-grid" class="grid grid-cols-4 gap-2">
                    <!-- Categories injected -->
                </div>

                <button onclick="saveTransaction()" id="save-btn" class="w-full py-5 text-white rounded-2xl font-black text-lg shadow-xl active:scale-[0.98] transition-all bg-orange-500">
                    保存する
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Config ---
        const firebaseConfig = JSON.parse('__firebase_config');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'osidori-web-app';
        const apiKey = ""; // Gemini API Key (Runtime)

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CATEGORIES = [
            { id: 'food', label: '食費', icon: '🍱', color: 'bg-orange-500' },
            { id: 'daily', label: '日用品', icon: '🛒', color: 'bg-blue-500' },
            { id: 'utility', label: '光熱費', icon: '💡', color: 'bg-yellow-500' },
            { id: 'rent', label: '住宅', icon: '🏠', color: 'bg-indigo-500' },
            { id: 'transport', label: '交通費', icon: '🚃', color: 'bg-green-500' },
            { id: 'ent', label: '娯楽', icon: '🎮', color: 'bg-pink-500' },
            { id: 'medical', label: '医療', icon: '🏥', color: 'bg-red-500' },
            { id: 'other', label: 'その他', icon: '✨', color: 'bg-gray-500' }
        ];

        let currentMode = 'couple';
        let currentUser = null;
        let selectedCategory = CATEGORIES[0].id;
        let unsubscribe = null;

        // --- Auth Setup ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) syncData();
        });

        initAuth();

        // --- Data Handling ---
        window.syncData = () => {
            if (!currentUser) return;
            if (unsubscribe) unsubscribe();

            const path = currentMode === 'couple' 
                ? collection(db, 'artifacts', appId, 'public', 'data', 'tx')
                : collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tx');

            unsubscribe = onSnapshot(query(path), (snap) => {
                const txs = snap.docs.map(doc => doc.data()).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderTransactions(txs);
            }, (err) => console.error(err));
        };

        function renderTransactions(txs) {
            const list = document.getElementById('transaction-list');
            const totalEl = document.getElementById('total-amount');
            let total = 0;
            
            if (txs.length === 0) {
                list.innerHTML = `<div class="py-20 text-center text-slate-300">履歴がありません</div>`;
                totalEl.textContent = "0";
                return;
            }

            list.innerHTML = txs.map(t => {
                total += (t.amount || 0);
                const cat = CATEGORIES.find(c => c.id === t.category) || CATEGORIES[7];
                return `
                    <div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-slate-100 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="${cat.color} w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-slate-100">${cat.icon}</div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">${cat.label}</p>
                                <p class="text-[10px] text-slate-400 font-medium">${t.date} • ${t.userName}</p>
                            </div>
                        </div>
                        <p class="font-black text-slate-700 italic">¥${t.amount?.toLocaleString()}</p>
                    </div>
                `;
            }).join('');
            totalEl.textContent = total.toLocaleString();
        }

        // --- Actions ---
        window.setMode = (mode) => {
            currentMode = mode;
            const bg = document.getElementById('mode-bg');
            const card = document.getElementById('balance-card');
            const btnAdd = document.getElementById('add-btn');
            const saveBtn = document.getElementById('save-btn');
            const title = document.getElementById('mode-title');
            const btnPrivate = document.getElementById('btn-private');
            const btnCouple = document.getElementById('btn-couple');

            if (mode === 'couple') {
                bg.style.transform = 'translateX(100%)';
                card.className = 'p-6 text-white mode-transition bg-orange-500';
                btnAdd.className = 'w-16 h-16 rounded-[2rem] shadow-2xl flex items-center justify-center text-white bg-orange-500 shadow-orange-200';
                saveBtn.className = 'w-full py-5 text-white rounded-2xl font-black text-lg shadow-xl bg-orange-500';
                title.textContent = 'ふたりの家計簿';
                btnCouple.classList.add('text-orange-600');
                btnPrivate.classList.remove('text-orange-600');
            } else {
                bg.style.transform = 'translateX(0)';
                card.className = 'p-6 text-white mode-transition bg-indigo-600';
                btnAdd.className = 'w-16 h-16 rounded-[2rem] shadow-2xl flex items-center justify-center text-white bg-indigo-600 shadow-indigo-200';
                saveBtn.className = 'w-full py-5 text-white rounded-2xl font-black text-lg shadow-xl bg-indigo-600';
                title.textContent = '自分の家計簿';
                btnPrivate.classList.add('text-indigo-600');
                btnCouple.classList.remove('text-indigo-600');
            }
            syncData();
        };

        window.openModal = () => {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.style.transform = 'translateY(0)';
            renderCategories();
        };

        window.closeModal = () => {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.style.transform = 'translateY(100%)';
        };

        function renderCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = CATEGORIES.map(c => `
                <button onclick="selectCategory('${c.id}')" class="py-3 rounded-2xl flex flex-col items-center gap-1 transition-all ${selectedCategory === c.id ? 'bg-orange-500 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}">
                    <span class="text-xl">${c.icon}</span>
                    <span class="text-[9px] font-black">${c.label}</span>
                </button>
            `).join('');
        }

        window.selectCategory = (id) => {
            selectedCategory = id;
            renderCategories();
        };

        window.saveTransaction = async () => {
            const amount = document.getElementById('input-amount').value;
            if (!amount || !currentUser) return;

            const path = currentMode === 'couple' 
                ? collection(db, 'artifacts', appId, 'public', 'data', 'tx')
                : collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tx');

            await addDoc(path, {
                amount: parseInt(amount),
                category: selectedCategory,
                date: new Date().toISOString().split('T')[0],
                createdAt: serverTimestamp(),
                userId: currentUser.uid,
                userName: currentMode === 'couple' ? 'パートナー' : '自分'
            });

            document.getElementById('input-amount').value = '';
            closeModal();
        };

        window.triggerFileSelect = () => document.getElementById('file-input').click();

        window.handleImageAnalysis = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const scanIcon = document.getElementById('scan-icon');
            const scanBtn = document.getElementById('scan-btn');
            scanIcon.className = "fa-solid fa-circle-notch animate-spin text-xl";
            scanBtn.classList.add('opacity-50', 'pointer-events-none');

            const reader = new FileReader();
            reader.onload = async (evt) => {
                const base64 = evt.target.result.split(',')[1];
                try {
                    const result = await analyzeReceipt(base64);
                    document.getElementById('input-amount').value = result.amount;
                    selectedCategory = result.category;
                    renderCategories();
                } catch (err) {
                    console.error("AI Error:", err);
                } finally {
                    scanIcon.className = "fa-solid fa-camera text-xl";
                    scanBtn.classList.remove('opacity-50', 'pointer-events-none');
                }
            };
            reader.readAsDataURL(file);
        };

        async function analyzeReceipt(base64) {
            const prompt = `Extract 'amount' and 'category' (one of: food, daily, utility, rent, transport, ent, medical, other) from this receipt. Return ONLY JSON: {"amount": 1200, "category": "food"}`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }]
                })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            return JSON.parse(text.replace(/```json|```/g, '').trim());
        }

        // Init Mode
        setMode('couple');
    </script>
</body>
</html>
